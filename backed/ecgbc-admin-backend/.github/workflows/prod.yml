name: Deploy to VPS

on:
  push:
    branches:
      - prod # Or your deployment branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Match your project's Node.js version

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest # Or a specific pnpm version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

    #   - name: Login to Docker Hub (Optional - if you use Docker Hub)
    #     if: github.event_name != 'pull_request' # Don't run on PRs
    #     uses: docker/login-action@v3
    #     with:
    #       username: ${{ secrets.DOCKERHUB_USERNAME }}
    #       password: ${{ secrets.DOCKERHUB_TOKEN }}

    #   - name: Set up Docker Buildx
    #     uses: docker/setup-buildx-action@v3

    #   - name: Build and push Docker image
    #     uses: docker/build-push-action@v6
    #     with:
    #       context: .
    #       file: ./Dockerfile
    #       push: ${{ github.event_name != 'pull_request' }} # Push only if not a PR
    #       tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecgbc-admin-backend:latest # Replace with your image name
    #       # cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ecgbc-admin-backend:buildcache
    #       # cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ecgbc-admin-backend:buildcache,mode=max

      - name: Deploy to VPS
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e # Exit immediately if a command exits with a non-zero status.
            cd /var/www/ecgbc-admin-backend
            
            echo "Pulling latest code from repository..."
            git checkout prod # Or your deployment branch
            git pull origin prod # Or your deployment branch
            
            echo "Building and restarting Docker containers with Docker Compose..."
            # --no-cache can be added if you want to ensure a fresh build every time
            # docker-compose build --no-cache app 
            docker-compose build app # 'app' should be your service name in docker-compose.yml
            docker-compose up -d --force-recreate app # '--force-recreate' ensures new image is used
            
            echo "Cleaning up unused Docker images (optional but recommended)..."
            docker image prune -af
            
            echo "Deployment successful!"
