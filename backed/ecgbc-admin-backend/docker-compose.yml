version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080" 
    environment:
      NODE_ENV: production 
      DATABASE_URL: ${DATABASE_URL} 
      PORT: 8080 
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      JWT_ACCESS_SECRET_KEY: ${JWT_ACCESS_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
    volumes:
      # For development, you might want to mount your source code for live reloading
      # - .:/usr/src/app 
      # Be careful with node_modules in volumes, often better to let container manage it
      # - /usr/src/app/node_modules # Anonymous volume to prevent host node_modules overwriting container's
      - ./public:/usr/src/app/public # Mount persistent storage for uploaded files
    # depends_on:
    #   - db
    restart: unless-stopped

