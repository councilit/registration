on:
 push:
   branches:
     - prod
name: 🚀 Deploy to Production VPS

jobs:
    deploy-production:
      name: 🎉 Deploy to Production
      runs-on: ubuntu-latest
      environment: production
      
      steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
  
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.1
          run_install: false
  
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: 🔨 Build for Production
        run: pnpm run build
        env:
          NODE_ENV: production
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
      
      - name: 📦 Create deployment archive
        run: |
          cd dist
          tar -czf ../production-build.tar.gz .
          cd ..
      
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Create backup of current deployment
            sudo mkdir -p /var/www/backup
            sudo cp -r /var/www/html /var/www/backup/html-$(date +%Y%m%d-%H%M%S) 2>/dev/null || true
            
            # Clear the deployment directory
            sudo rm -rf /var/www/html/*
            
            # Create temp directory for new deployment
            mkdir -p ~/temp-deploy
            
      - name: 📁 Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "production-build.tar.gz"
          target: "~/temp-deploy/"
          
      - name: 🔄 Extract and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Extract files
            cd ~/temp-deploy
            tar -xzf production-build.tar.gz
            
            # Use rsync to sync files to web directory
            rsync -avz --delete ./ /var/www/dashboard/
            
            # Cleanup
            rm -rf ~/temp-deploy
            
            echo "Deployment completed successfully!"